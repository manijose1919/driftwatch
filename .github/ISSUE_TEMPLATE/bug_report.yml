name: Bug report
description: Something isn't working as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please fill in what you can — reproduction steps help most.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the endpoint config, probe, or API call involved. The built-in `/demo/products` API and its scenarios are great for isolating drift-detection bugs.
      placeholder: |
        1. Add endpoint pointing at ...
        2. Probe N times ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DriftWatch version
      description: From the app (`/healthz` returns it) or the release tag.
      placeholder: "1.2.0"
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and how you run it (start.ps1, uvicorn, Docker).
      placeholder: "Windows 11 · Python 3.12 · Docker"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Any error output or `driftwatch.*` log lines. This will be rendered as code.
      render: shell
